<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linktree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 480px;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
            background-image: url('obrazy/79a7c2a3d22d85f5a31f76c5665e35ee.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            -webkit-box-shadow: 4px 4px 100px 38px rgba(0, 0, 0, 1);
            -moz-box-shadow: 4px 4px 100px 38px rgba(0, 0, 0, 1);
            box-shadow: 4px 4px 100px 38px rgba(0, 0, 0, 1);
        }
        
        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            display: block;
        }
        
        .nazwa {
            text-align: center;
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .bio {
            text-align: center;
            color: #ffffff;
            font-size: 15px;
            margin-bottom: 30px;
        }
        
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .link {
            width: 100%;
            padding: 16px 20px;
            background-color: #ffffff;
            border-radius: 50px;
            text-decoration: none;
            color: #000000;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            transition: background-color 0.2s;
            box-shadow: 2px 4px 0 #222;
        }
        
        .link:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container" >
        <img src="obrazy/max-interlagos.png" alt="Profile" class="profile-image">
        <div class="nazwa">@Michał</div>
        <div class="bio">Szef,emeryt,web programer,</div>
        
        <div class="links">
            <a href="#" class="link">Sim racing</a>
            <a href="#" class="link">Programowanie</a>
            <a href="#" class="link"></a>
            <a href="#" class="link">Spotify</a>
            
        </div>
        <div class="socials">
                <a href="#"><img src="obrazy/instagram.png" alt="Instagram" width="30"></a>
                <a href="#"><img src="obrazy/twitter.png" alt="Twitter" width="30"></a>
                <a href="#"><img src="obrazy/facebook.png" alt="Facebook" width="30"></a>
        </div>
    </div>
</body>
</html>
